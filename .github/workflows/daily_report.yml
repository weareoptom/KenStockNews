name: Daily Stock RSS Reporter

# 設定觸發時間
on:
  schedule:
    # 這是 UTC 時間。Brisbane 是 UTC+10
    # 所以要早上 8:00 Brisbane 時間執行，對應的 UTC 時間是前一天的 22:00
    - cron: '0 22 * * *'
  # 允許手動點擊觸發 (方便測試)
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 加上快取可加快安裝速度
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Inject Secrets into config.json
        run: |
          # 讀取原本的 config.template.json，並將 secrets 注入進去
          python -c "
          import json
          import os
          
          with open('config.template.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
              
          data['telegram']['bot_token'] = os.environ.get('TG_BOT_TOKEN')
          data['telegram']['chat_id'] = os.environ.get('TG_CHAT_ID')
          
          with open('config.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=4)
          "
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          

      - name: Run Main Script
        run: python main.py
