name: Daily Stock RSS Reporter

# 設定觸發時間
on:
  schedule:
    # 這是 UTC 時間。Brisbane 是 UTC+10
    # 所以要早上 8:00 Brisbane 時間執行，對應的 UTC 時間是前一天的 22:00
    - cron: '0 22 * * *'
  # 允許手動點擊觸發 (方便測試)
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 加上快取可加快安裝速度
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create .env File
        run: |
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" >> .env
          echo "TG_CHAT_ID=${{ secrets.TG_CHAT_ID }}" >> .env
          

      - name: Run Main Script
        run: python main.py
